<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Gudang Raw Material Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        /* CSS Anda tetap sama seperti sebelumnya untuk menjaga tampilan */
        body { font-family: sans-serif; padding: 20px; background: #f3f4f6; }
        .card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #3b82f6; }
    </style>
</head>
<body>

    <h2>GUDANG RAW MATERIAL ONLINE</h2>
    
    <div style="background: white; padding: 15px; border-radius: 8px;">
        <input id="code" placeholder="Kode RM">
        <input id="qty" type="number" placeholder="Qty">
        <input id="pallet" placeholder="Pallet">
        <button onclick="simpanData()">Simpan ke Cloud</button>
    </div>

    <div id="area">Loading data dari server...</div>

    <script>
        // --- 1. https://gudangrawmat-76d53-default-rtdb.asia-southeast1.firebasedatabase.app/ ---
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA9bEF4ylQ5zgl-7qnTD4zzeLUO1_pPnb0",
  authDomain: "gudangrawmat-76d53.firebaseapp.com",
  databaseURL: "https://gudangrawmat-76d53-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "gudangrawmat-76d53",
  storageBucket: "gudangrawmat-76d53.firebasestorage.app",
  messagingSenderId: "397040608472",
  appId: "1:397040608472:web:ca573b8ba1efb6de1663ad",
  measurementId: "G-NY5T0JM3T1"
};

        // --- 2. Inisialisasi ---
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 3. Fungsi Simpan Data ke Server ---
        function simpanData() {
            const code = document.getElementById('code').value;
            const qty = document.getElementById('qty').value;
            const pallet = document.getElementById('pallet').value;

            db.collection("data_gudang").add({
                code: code,
                qty: Number(qty),
                pallet: pallet,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => alert("Data berhasil masuk ke server!"))
            .catch((err) => alert("Gagal: " + err));
        }

        // --- 4. Fungsi Ambil Data (Live Update) ---
        // Dengan ini, data otomatis update di HP semua orang tanpa refresh!
        db.collection("data_gudang").onSnapshot((snapshot) => {
            let html = '';
            snapshot.forEach((doc) => {
                let d = doc.data();
                html += `
                <div class="card">
                    <b>${d.code}</b><br>
                    Qty: ${d.qty} | Pallet: ${d.pallet}
                </div>`;
            });
            document.getElementById('area').innerHTML = html;
        });
    </script>
</body>
</html>
