<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudang Raw Material Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #f3f4f6; --card: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .wrap { max-width: 800px; margin: auto; }
        .header-box { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
        .controls { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input, select, button { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .pallet { background: var(--card); border-radius: 8px; padding: 10px; border-left: 6px solid #ccc; font-size: 12px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 4px 6px; margin: 3px 0; border-radius: 4px; border: 1px solid #e2e8f0; font-size: 11px; }
        .btn-action { padding: 2px 2px; background: none; border: none; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="header-box">GUDANG RAW MATERIAL ONLINE</div>
    <div class="controls">
        <input id="cari" placeholder="🔍 Cari Kode RM..." onkeyup="render()">
        <div class="input-group" style="margin-top:10px;">
            <input id="code" placeholder="Kode RM">
            <input id="qty" type="number" placeholder="Qty (Kg)">
            <input id="tgl" type="date">
            <input id="pallet" placeholder="Pallet (e.g. A1)">
        </div>
        <button onclick="tambahData()" style="width:100%; margin-bottom:10px;">Simpan ke Cloud</button>
        <button onclick="exportCSV()" style="width:100%; background:#f59e0b;">📤 Export Data</button>
    </div>

    <div id="area" class="grid">Loading data...</div>
</div>

<script>
    // 1. KONFIGURASI FIREBASE (PASTE DISINI)
    const firebaseConfig = {
        apiKey: "AIzaSyA9bEF4ylQ5zgl-7qnTD4zzeLUO1_pPnb0",
        databaseURL: "https://gudangrawmat-76d53-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "gudangrawmat-76d53"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Variable global untuk simpan data dari Firebase
    let dbData = []; 

    document.getElementById('tgl').valueAsDate = new Date();

    // 2. Ambil data Realtime
    db.ref('stok_gudang').on('value', (snapshot) => {
        dbData = [];
        const val = snapshot.val();
        if(val) {
            Object.keys(val).forEach(id => {
                dbData.push({ id, ...val[id] });
            });
        }
        render();
    });

    // 3. Fungsi Tambah
    function tambahData() {
        const code = document.getElementById('code').value.toUpperCase();
        const qty = document.getElementById('qty').value;
        const tgl = document.getElementById('tgl').value;
        const pallet = document.getElementById('pallet').value.toUpperCase();

        if(!code || !qty || !pallet) return alert('Lengkapi data');
        
        db.ref('stok_gudang').push({ code, qty, tgl, pallet })
        .then(() => {
            document.getElementById('code').value = '';
            document.getElementById('qty').value = '';
        });
    }

    // 4. Render Tampilan (Tetap pakai desain asli)
    function render() {
        let s = document.getElementById('cari').value.toLowerCase();
        let area = document.getElementById('area');
        area.innerHTML = '';
        
        // Filter & Grouping
        let filtered = dbData.filter(x => x.code.toLowerCase().includes(s));
        let pallets = [...new Set(dbData.map(x => x.pallet))].sort();

        pallets.forEach(p => {
            let items = filtered.filter(x => x.pallet == p);
            if(items.length == 0) return;

            let h = `<div class="pallet"><div style="font-weight:bold;">${p}</div>`;
            items.forEach(x => {
                h += `<div class="item">
                    <span><b>${x.code}</b> (${x.qty}Kg)</span>
                    <button class="btn-action" onclick="hapus('${x.id}')">🗑️</button>
                </div>`;
            });
            area.innerHTML += h + '</div>';
        });
    }

    function hapus(id) {
        if(confirm('Hapus item?')) db.ref('stok_gudang/' + id).remove();
    }

    function exportCSV() {
        if(dbData.length === 0) return alert('Data kosong');
        let csv = "Code,Qty,Tgl,Pallet\n";
        dbData.forEach(x => csv += `${x.code},${x.qty},${x.tgl},${x.pallet}\n`);
        let url = window.URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        let a = document.createElement('a');
        a.href = url; a.download = 'Data_Gudang.csv'; a.click();
    }
</script>
</body>
</html>
