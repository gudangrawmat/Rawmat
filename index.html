<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudang Raw Material Online</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --bg: #f3f4f6; --card: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .wrap { max-width: 800px; margin: auto; }
        .header-box { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; font-weight: 700; text-transform: uppercase; }
        .controls { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        input, select, button { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .pallet { background: var(--card); border-radius: 8px; padding: 10px; border-left: 6px solid #f59e0b; font-size: 12px; }
        .item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 4px 6px; margin: 3px 0; border-radius: 4px; border: 1px solid #e2e8f0; font-size: 11px; }
        .summary { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 12px; }
    </style>
</head>
<body>

<div class="wrap">
    <div class="header-box">GUDANG RAW MATERIAL ONLINE</div>
    
    <div class="controls">
        <input id="code" placeholder="Kode RM">
        <input id="qty" type="number" placeholder="Qty (Kg)">
        <input id="tgl" type="date">
        <select id="pallet"></select>
        <button onclick="tambahData()" style="margin-top:10px; width:100%;">Simpan ke Cloud</button>
    </div>

    <div id="area" class="grid">Loading data...</div>
    <div class="summary" id="ringkasan"></div>
</div>

<script>
    // 1. Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyA9bEF4ylQ5zgl-7qnTD4zzeLUO1_pPnb0",
        databaseURL: "https://gudangrawmat-76d53-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "gudangrawmat-76d53"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Setup Pallet
    const pallets = [];
    for(let i=1; i<=46; i++) pallets.push('A'+i);
    for(let i=1; i<=48; i++) pallets.push('B'+i);
    document.getElementById('pallet').innerHTML = pallets.map(x => `<option value="${x}">${x}</option>`).join('');
    document.getElementById('tgl').valueAsDate = new Date();

    // 2. Fungsi Simpan Data
    function tambahData() {
        const code = document.getElementById('code').value.toUpperCase();
        const qty = document.getElementById('qty').value;
        const tgl = document.getElementById('tgl').value;
        const pallet = document.getElementById('pallet').value;

        if(!code || !qty) return alert('Lengkapi data');

        db.ref('gudang_data').push({ code, qty, tgl, pallet })
        .then(() => {
            alert("Data berhasil tersimpan di Cloud!");
            document.getElementById('code').value = '';
        });
    }

    // 3. Fungsi Hapus
    function hapusData(id) {
        if(confirm('Hapus item?')) db.ref('gudang_data/' + id).remove();
    }

    // 4. Update Tampilan Real-time
    db.ref('gudang_data').on('value', (snapshot) => {
        const data = snapshot.val();
        const area = document.getElementById('area');
        const ringkasan = document.getElementById('ringkasan');
        area.innerHTML = '';
        
        if (!data) return;

        // Render Data per Pallet
        pallets.forEach(p => {
            let items = Object.entries(data).filter(([id, item]) => item.pallet === p);
            if (items.length > 0) {
                let html = `<div class="pallet"><b>${p} (${items.length}/4)</b>`;
                items.forEach(([id, item]) => {
                    html += `<div class="item">
                        <span><b>${item.code}</b> (${item.qty}Kg)</span>
                        <button onclick="hapusData('${id}')" style="background:red; border:none; color:white; cursor:pointer;">X</button>
                    </div>`;
                });
                area.innerHTML += html + '</div>';
            }
        });
    });
</script>
</body>
</html>
